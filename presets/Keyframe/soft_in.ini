# Keyframe curve preset for SMM: section name must be KeyframeCurvePreset:<id>
# EaseIn: MinGfx 0=Linear ... 13=Bezier
# EaseOut: 255=inherit (segment leaving this key), else 0-13
# Interp: 0=Eased, 1=Hold, 2=Linear, 3=Bezier (float value cubic; tangents below)

[KeyframeCurvePreset:soft_in]
DisplayName=Soft Ease In
EaseIn=1
EaseOut=255
Interp=0
TangentIn=0.333333
TangentOut=0.333333
