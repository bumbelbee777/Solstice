name: CTest Quick

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ctest-quick:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libx11-dev libxext-dev libxrandr-dev libxfixes-dev libxcursor-dev libxi-dev \
            libxss-dev libxinerama-dev libxxf86vm-dev libxtst-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            libdrm-dev libgbm-dev libegl1-mesa-dev libgl1-mesa-dev \
            libdecor-0-dev \
            ffmpeg \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev
          # Skip example games on CI: lowers peak RAM vs building deps + engine + tests + examples at once.
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DSOLSTICE_BUILD_EXAMPLES=OFF \
            -DSOLSTICE_BUILD_UTILITIES=ON

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release --parallel

      # Linux: phased targets + bounded parallelism (half of nproc) to avoid OOM on shared runners.
      - name: Build third-party deps (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          JOBS=$(nproc)
          JOBS=$(( JOBS < 2 ? 1 : JOBS / 2 ))
          cmake --build build --config Release --parallel "$JOBS" --target solstice_deps

      - name: Build engine (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          JOBS=$(nproc)
          JOBS=$(( JOBS < 2 ? 1 : JOBS / 2 ))
          cmake --build build --config Release --parallel "$JOBS" --target SolsticeEngine

      - name: Build tests (quick) (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          JOBS=$(nproc)
          JOBS=$(( JOBS < 2 ? 1 : JOBS / 2 ))
          cmake --build build --config Release --parallel "$JOBS" --target solstice_quick_tests

      - name: Build utilities (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          JOBS=$(nproc)
          JOBS=$(( JOBS < 2 ? 1 : JOBS / 2 ))
          cmake --build build --config Release --parallel "$JOBS" --target solstice_utilities

      - name: CTest quick
        run: ctest --test-dir build -C Release -L quick --output-on-failure

# Optional local / nightly stress + fuzz (build first):
#   ctest --test-dir build -C Release -L stress --output-on-failure
#   ctest --test-dir build -C Release -L fuzz --output-on-failure
#   ctest --test-dir build -C Release -L gpu --output-on-failure   # set SOLSTICE_GPU_TEST=1 where GPU is available
