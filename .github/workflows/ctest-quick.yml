name: CTest Quick

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ctest-quick:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # Linux: ccache location + glibc allocator tuning (fewer arenas → lower RSS on parallel GCC).
      - name: Linux build environment (ccache, memory)
        if: runner.os == 'Linux'
        run: |
          echo "CCACHE_DIR=${{ github.workspace }}/.ccache" >> "$GITHUB_ENV"
          echo "CCACHE_COMPRESS=1" >> "$GITHUB_ENV"
          echo "CCACHE_COMPRESSLEVEL=6" >> "$GITHUB_ENV"
          echo "CCACHE_MAXSIZE=500M" >> "$GITHUB_ENV"
          echo "CCACHE_SLOPPINESS=include_file_ctime,include_file_mtime" >> "$GITHUB_ENV"
          echo "MALLOC_ARENA_MAX=2" >> "$GITHUB_ENV"

      - name: Cache ccache (Linux)
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-linux-${{ hashFiles('CMakeLists.txt', '**/CMakeLists.txt', '3rdparty/cmake/**/*.cmake') }}
          restore-keys: |
            ccache-linux-

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ccache \
            ninja-build \
            pkg-config \
            libx11-dev libxext-dev libxrandr-dev libxfixes-dev libxcursor-dev libxi-dev \
            libxss-dev libxinerama-dev libxxf86vm-dev libxtst-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            libdrm-dev libgbm-dev libegl1-mesa-dev libgl1-mesa-dev \
            libdecor-0-dev \
            ffmpeg \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev
          ccache --zero-stats
          # Ninja: faster incremental graphs than Make; often a bit lighter than make -j on huge DAGs.
          # ccache is picked up automatically (see root CMakeLists.txt) when on PATH before project().
          cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release \
            -DSOLSTICE_BUILD_EXAMPLES=OFF \
            -DSOLSTICE_BUILD_UTILITIES=ON

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release --parallel

      # Linux: phased targets + bounded parallelism (half of nproc) to avoid OOM on shared runners.
      - name: Build third-party deps (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          JOBS=$(nproc)
          JOBS=$(( JOBS < 2 ? 1 : JOBS / 2 ))
          cmake --build build --parallel "$JOBS" --target solstice_deps

      - name: Build engine (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          JOBS=$(nproc)
          JOBS=$(( JOBS < 2 ? 1 : JOBS / 2 ))
          cmake --build build --parallel "$JOBS" --target SolsticeEngine

      - name: Build tests (quick) (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          JOBS=$(nproc)
          JOBS=$(( JOBS < 2 ? 1 : JOBS / 2 ))
          cmake --build build --parallel "$JOBS" --target solstice_quick_tests

      - name: Build utilities (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          JOBS=$(nproc)
          JOBS=$(( JOBS < 2 ? 1 : JOBS / 2 ))
          cmake --build build --parallel "$JOBS" --target solstice_utilities

      - name: ccache statistics (Linux)
        if: runner.os == 'Linux'
        run: ccache --show-stats

      - name: CTest quick
        run: ctest --test-dir build -C Release -L quick --output-on-failure

# Optional local / nightly stress + fuzz (build first):
#   ctest --test-dir build -C Release -L stress --output-on-failure
#   ctest --test-dir build -C Release -L fuzz --output-on-failure
#   ctest --test-dir build -C Release -L gpu --output-on-failure   # set SOLSTICE_GPU_TEST=1 where GPU is available
